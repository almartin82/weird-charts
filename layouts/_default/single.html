{{ define "main" }}
<article>
    {{ .Content }}
    {{ $contributor := .Params.contributor }}
    {{ with $contributor }}
        <p>contributed by <a href="{{ $.Site.BaseURL }}contributor/{{ . | lower }}/">{{ . }}</a> on
    {{ end }}
    <a href="{{ .Permalink }}">{{ .Date.Format "Jan 2, 2006" }}</a>
    </p>
</article>
{{ end }}
