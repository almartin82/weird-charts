{{ define "main" }}
<h2 class="taxonomy-title">{{ .Title | lower }}</h2>
<ul class="terms-list">
{{- range .Data.Terms.Alphabetical }}
    <li class="term-item">
        <a href="{{ .Page.RelPermalink }}">{{ .Name }}</a>
        <span class="term-count">{{ .Count }}</span>
    </li>
{{- end }}
</ul>
{{ end }}
