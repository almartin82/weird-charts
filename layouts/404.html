{{ define "main" }}

                <circle cx="55"  cy="190" r="4"/>
                <circle cx="125" cy="168" r="4"/>
                <circle cx="195" cy="174" r="4"/>
                <circle cx="265" cy="140" r="4"/>
                <circle cx="335" cy="148" r="4"/>
                <circle cx="405" cy="105" r="4"/>
                <circle cx="475" cy="82"  r="4"/>
            </g>
            <line x1="545" y1="210" x2="545" y2="60" class="fof-missing-stem"/>
            <circle cx="545" cy="60" r="7" class="fof-missing"/>
            <text x="545" y="42" text-anchor="middle" class="fof-missing-label">404</text>

</section>
