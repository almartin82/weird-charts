<script>
(function () {
    function ensureWidgetsScript() {
        if (window.twttr || document.getElementById('wc-twttr')) return;
        var s = document.createElement('script');
        s.id = 'wc-twttr';
        s.async = true;
        s.src = 'https://platform.twitter.com/widgets.js';
        document.head.appendChild(s);
    }

    function upgrade(el) {
        ensureWidgetsScript();
        el.classList.remove('wc-tweet-defer');
        el.classList.add('twitter-tweet');
        function load() { window.twttr.widgets.load(el.parentNode); }
        if (window.twttr && window.twttr.widgets && window.twttr.widgets.load) {
            load();
        } else {
            var tries = 0;
            (function poll() {
                if (window.twttr && window.twttr.widgets && window.twttr.widgets.load) return load();
                if (++tries > 200) return;
                setTimeout(poll, 60);
            })();
        }
    }

    function observeAll(root) {
        var nodes = (root || document).querySelectorAll('.wc-tweet-defer');
        if (!nodes.length) return;
        if (!('IntersectionObserver' in window)) {
            nodes.forEach(upgrade);
            return;
        }
        nodes.forEach(function (el) { observer.observe(el); });
    }

    var observer = ('IntersectionObserver' in window) ? new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
            if (!entry.isIntersecting) return;
            observer.unobserve(entry.target);
            upgrade(entry.target);
        });
    }, { rootMargin: '600px 0px' }) : null;

    window.wcObserveTweets = observeAll;
    observeAll();
})();
</script>
