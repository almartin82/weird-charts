name: Retweet new charts

# Retweets the source tweet of each newly added post from @weirdcharts.
# Kept separate from hugo.yaml so a Twitter API failure never blocks the deploy.

on:
  push:
    branches:
      - main
    paths:
      - 'content/posts/**'

jobs:
  retweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tweepy
        run: pip install tweepy
      - name: Retweet newly added posts
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: python scripts/retweet_new_posts.py
